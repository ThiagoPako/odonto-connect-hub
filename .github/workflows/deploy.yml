name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== Starting deploy $(date) ==="
            
            # Frontend
            cd /root/odonto-connect
            git fetch origin main
            git reset --hard origin/main
            
            if command -v bun &> /dev/null; then
              bun install
              bun run build
            else
              npm install
              npm run build
            fi
            
            pm2 restart odonto-connect || true
            
            echo "=== Frontend built and restarted ==="
            
            # API server
            cd /root/odonto-connect/vps-api-server
            npm install --production
            pm2 restart odonto-api || pm2 start server.mjs --name odonto-api
            
            echo "=== API restarted ==="
            
            # Run pending migrations
            sudo -u postgres psql -d odonto_db -f /root/odonto-connect/vps-api-server/migration.sql 2>&1 || true
            
            echo "=== Deploy complete $(date) ==="
