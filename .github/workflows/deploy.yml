name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/odonto-connect
            git pull origin main
            bun install
            bun run build
            pm2 restart odonto-connect

            # Update API server if package.json changed
            cd vps-api-server
            npm install --production
            pm2 restart odonto-api || pm2 start server.mjs --name odonto-api
